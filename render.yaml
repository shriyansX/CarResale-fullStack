services:
  # ================================
  # 1. React Frontend (Static Site)
  # ================================
  - type: web
    name: car-resale-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_BASE_URL
        sync: false
      - key: VITE_CURRENCY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ================================
  # 2. Express API (Node Web Service)
  # ================================
  - type: web
    name: car-resale-api
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: ML_API_URL
        fromService:
          name: car-resale-ml
          type: web
          property: hostport
      - key: CLIENT_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: PORT
        value: "3000"

  # ================================
  # 3. ML Backend (Python Web Service)
  # ================================
  - type: web
    name: car-resale-ml
    runtime: python
    buildCommand: cd ml_backend && pip install -r requirements.txt
    startCommand: cd ml_backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8000"
